<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alpha Terminal v43 | Stable</title>

<style>
:root {
 --bg:#0b0e11; --card:#161a1e; --border:#2b2f36;
 --bull:#00ffad; --bear:#ff3b30; --accent:#58a6ff; --gold:#f0b90b;
}

body {
 background:var(--bg); color:#eaecef;
 font-family:Inter,sans-serif; margin:0; padding:4px; font-size:10px;
}

.dashboard { display:grid; grid-template-columns:1fr; gap:8px; }

@media (min-width:1024px){
 .dashboard{
   grid-template-columns:240px 1fr 300px;
   grid-template-rows:auto 500px;
 }
 .card-wl { grid-row:1 / 3; }
 .card-table { grid-column:2 / 4; grid-row:1; }
 .card-chart { grid-column:2 / 4; grid-row:2; }
}

.card {
 background:var(--card);
 border:1px solid var(--border);
 border-radius:8px;
 padding:12px;
}

.monitor-table {
 width:100%;
 min-width:1200px;
 border-collapse:collapse;
}

.monitor-table th { color:#848e9c; font-size:9px; padding:6px; }
.monitor-table td { padding:8px; font-family:monospace; }

.trend-meter { width:40px; height:4px; background:#333; }
.trend-fill { height:100%; }

.wl-item { display:flex; justify-content:space-between; padding:6px; border-bottom:1px solid #222; }

input { width:100%; padding:6px; background:#111; color:white; }

.btn-add { background:var(--accent); color:white; padding:6px; border:none; margin-top:5px; cursor:pointer; }

.reasoning { font-size:9px; color:#aaa; }

</style>
</head>

<body>

<div class="dashboard">

<!-- WATCHLIST -->
<div class="card card-wl">
<h3>⭐ WATCHLIST</h3>
<input id="newT" placeholder="SOL">
<button class="btn-add" onclick="addTicker()">ADD</button>
<button class="btn-add" onclick="resetJSON()">RESET JSON</button>
<div id="wl-cont"></div>
</div>

<!-- TABLE -->
<div class="card card-table">
<h3>📊 PREDATOR TABLE</h3>
<table class="monitor-table">
<thead>
<tr>
<th>TICKER</th><th>PRICE</th><th>TREND</th><th>SUP/RES</th>
<th>SQZ</th><th>SENTIMENT</th><th>DIVERGENCE</th>
<th>VOL</th><th>WHALE</th><th>SIGNAL</th><th>HEADS</th><th>REASON</th>
</tr>
</thead>
<tbody id="monitor-body"></tbody>
</table>
</div>

<!-- CHART -->
<div class="card card-chart" style="padding:0;">
<div id="tv_chart_container" style="height:100%;"></div>
</div>

</div>

<script src="https://s3.tradingview.com/tv.js"></script>

<script>

let defaultWL = [];
let watchlist = [];
let dataStore = {};
let currentS = "";

// 🔥 LOAD JSON ONLY FIRST TIME
async function initWatchlist(){
 let saved = localStorage.getItem('alphaWL');

 if(saved){
   watchlist = JSON.parse(saved);
 } else {
   try{
     const res = await fetch('watchlist.json');
     const json = await res.json();
     watchlist = json.watchlist;
     localStorage.setItem('alphaWL', JSON.stringify(watchlist));
   }catch(e){
     watchlist = ["BINANCE:BTCUSDT"];
   }
 }

 currentS = watchlist[0];
}

// 🔥 FETCH DATA
async function sync(){

 for(let s of watchlist){

   const pair = s.split(':')[1];

   // fallback ALWAYS
   dataStore[s] = {
     p:"--", trend:0, tCol:"#555",
     sr:"-", sqz:"-", sent:"-",
     div:"-", shock:"-", whale:"-",
     sig:"WAIT", heads:"-", reason:"Loading..."
   };

   try{
     const res = await fetch(`https://api.allorigins.win/raw?url=https://api.binance.com/api/v3/ticker/24hr?symbol=${pair}`);
     const d = await res.json();

     const close = parseFloat(d.lastPrice);
     const change = parseFloat(d.priceChangePercent);
     const high = parseFloat(d.highPrice);
     const low = parseFloat(d.lowPrice);

     const rsi = (45 + change * 2).toFixed(0);
     const pp = (high + low + close) / 3;

     dataStore[s] = {
       p:close.toFixed(2),
       trend:Math.abs(change)*15,
       tCol:change>0?'var(--bull)':'var(--bear)',
       sr:`R:${(2*pp-low).toFixed(2)} S:${(2*pp-high).toFixed(2)}`,
       sqz:Math.abs(change)<1?"●":"○",
       sent:`${(50+change*3).toFixed(0)}%`,
       div:change<-2?"BULL":(change>2?"BEAR":"None"),
       shock:(1+Math.random()).toFixed(2)+"x",
       whale:"Quiet",
       sig:change>3?"BUY":(change<-3?"SELL":"WAIT"),
       heads:rsi>70?"OVERBOUGHT":(rsi<30?"OVERSOLD":"Normal"),
       reason:"Live Data"
     };

   }catch(e){
     dataStore[s].reason = "API Blocked";
   }
 }

 render();
}

// 🔥 RENDER
function render(){
 const body = document.getElementById('monitor-body');
 const wl = document.getElementById('wl-cont');

 body.innerHTML="";
 wl.innerHTML="";

 watchlist.forEach(s=>{
   const d = dataStore[s];

   wl.innerHTML += `
   <div class="wl-item">
     <span onclick="switchT('${s}')">${s.split(':')[1]}</span>
     <span onclick="delT('${s}')" style="color:red">x</span>
   </div>`;

   body.innerHTML += `
   <tr>
     <td>${s.split(':')[1]}</td>
     <td>${d.p}</td>
     <td><div class="trend-meter"><div class="trend-fill" style="width:${d.trend}%;background:${d.tCol}"></div></div></td>
     <td>${d.sr}</td>
     <td>${d.sqz}</td>
     <td>${d.sent}</td>
     <td>${d.div}</td>
     <td>${d.shock}</td>
     <td>${d.whale}</td>
     <td>${d.sig}</td>
     <td>${d.heads}</td>
     <td class="reasoning">${d.reason}</td>
   </tr>`;
 });
}

// ACTIONS
function switchT(s){
 currentS=s;
 new TradingView.widget({
   autosize:true,
   symbol:s,
   interval:"30",
   theme:"dark",
   container_id:"tv_chart_container"
 });
}

function addTicker(){
 const v=document.getElementById('newT').value.toUpperCase();
 if(v){
   watchlist.push(`BINANCE:${v}USDT`);
   localStorage.setItem('alphaWL', JSON.stringify(watchlist));
   sync();
 }
}

function delT(s){
 watchlist=watchlist.filter(x=>x!==s);
 localStorage.setItem('alphaWL', JSON.stringify(watchlist));
 sync();
}

function resetJSON(){
 localStorage.removeItem('alphaWL');
 location.reload();
}

// INIT
window.onload = async ()=>{
 await initWatchlist();
 switchT(currentS);
 sync();
 setInterval(sync,10000);
};

</script>

</body>
</html>
