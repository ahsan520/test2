<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alpha Terminal v50 | Live WS</title>

<style>
:root {
    --bg:#0b0e11; --card:#161a1e; --border:#2b2f36;
    --bull:#00ffad; --bear:#ff3b30; --accent:#58a6ff; --gold:#f0b90b;
}

body {
    background:var(--bg);
    color:#eaecef;
    font-family:Arial;
    margin:0;
    padding:6px;
}

.dashboard {
    display:grid;
    grid-template-columns:220px 1fr;
    grid-template-rows:auto 500px;
    gap:8px;
}

.card {
    background:var(--card);
    border:1px solid var(--border);
    border-radius:8px;
    padding:10px;
}

.card-table { grid-column:2; grid-row:1; }
.card-chart { grid-column:2; grid-row:2; padding:0; }
.card-wl { grid-column:1; grid-row:1 / span 2; }

table {
    width:100%;
    border-collapse:collapse;
    font-size:11px;
}

th { color:#888; text-align:left; padding:6px; }
td { padding:8px 6px; border-top:1px solid #222; }

input {
    width:100%;
    padding:8px;
    margin-bottom:6px;
    background:#0b0e11;
    border:1px solid #444;
    color:white;
}

button {
    padding:6px;
    margin-right:4px;
    border:none;
    cursor:pointer;
}

.btn-add { background:var(--accent); }
.btn-reset { background:#666; }

.wl-item {
    display:flex;
    justify-content:space-between;
    padding:6px;
    border-bottom:1px solid #222;
}

.trend-meter {
    width:40px;
    height:4px;
    background:#333;
}

.trend-fill { height:100%; }

</style>
</head>

<body>

<div class="dashboard">

<!-- WATCHLIST -->
<div class="card card-wl">
<h3>⭐ WATCHLIST</h3>

<input id="newT" placeholder="SOL">
<button class="btn-add" onclick="addTicker()">ADD</button>
<button class="btn-reset" onclick="resetWL()">RESET</button>

<div id="wl"></div>
</div>

<!-- TABLE -->
<div class="card card-table">
<h3>📊 LIVE TABLE (WebSocket)</h3>

<table>
<thead>
<tr>
<th>TICKER</th>
<th>PRICE</th>
<th>TREND</th>
<th>SUP/RES</th>
<th>SQZ</th>
<th>SENTIMENT</th>
<th>DIVERGENCE</th>
<th>VOL</th>
<th>WHALE</th>
<th>SIGNAL</th>
<th>HEADS</th>
<th>REASON</th>
</tr>
</thead>

<tbody id="tbody"></tbody>
</table>
</div>

<!-- CHART -->
<div class="card card-chart">
<div id="tv_chart_container" style="height:100%"></div>
</div>

</div>

<script src="https://s3.tradingview.com/tv.js"></script>

<script>
let DEFAULTS = ["BINANCE:BTCUSDT","BINANCE:ETHUSDT","BINANCE:SOLUSDT"];

let watchlist = JSON.parse(localStorage.getItem('alphaWL')) || DEFAULTS;
let dataStore = {};
let socket;
let currentS = watchlist[0];

function saveWL() {
    localStorage.setItem('alphaWL', JSON.stringify(watchlist));
}

function resetWL() {
    watchlist = [...DEFAULTS];
    saveWL();
    startWS();
}

function addTicker() {
    let v = document.getElementById('newT').value.toUpperCase();
    if (!v) return;

    let sym = "BINANCE:" + v + "USDT";

    if (!watchlist.includes(sym)) {
        watchlist.push(sym);
        saveWL();
        startWS();
    }
}

function removeTicker(s) {
    watchlist = watchlist.filter(x => x !== s);
    saveWL();
    startWS();
}

function startWS() {

    if (socket) socket.close();

    let streams = watchlist.map(s => s.split(':')[1].toLowerCase() + "@trade").join('/');

    socket = new WebSocket("wss://stream.binance.com:9443/stream?streams=" + streams);

    socket.onmessage = (event) => {
        let msg = JSON.parse(event.data);
        let data = msg.data;

        let symbol = "BINANCE:" + data.s;

        let price = parseFloat(data.p);

        let change = (Math.random()*4 - 2); // simulate %

        let rsi = (45 + change*2).toFixed(0);

        let high = price * 1.02;
        let low = price * 0.98;

        let pp = (high + low + price)/3;
        let r1 = (2*pp)-low;
        let s1 = (2*pp)-high;

        let trend = Math.min(100, Math.abs(change)*15);

        dataStore[symbol] = {
            p: price.toFixed(2),
            trend,
            tCol: change>0 ? 'var(--bull)' : 'var(--bear)',
            sr: `R:${r1.toFixed(2)} S:${s1.toFixed(2)}`,
            sqz: Math.abs(change)<1?'●':'○',
            sent: (50 + change*3).toFixed(0)+'%',
            div: change>2?'BEAR':change<-2?'BULL':'None',
            vol:(1+Math.random()).toFixed(2)+'x',
            whale:'Quiet',
            sig: change>2?'BUY':change<-2?'SELL':'WAIT',
            heads:'Normal',
            reason:'Live Flow'
        };

        render();
    };
}

function render() {

    let tbody = document.getElementById('tbody');
    let wl = document.getElementById('wl');

    tbody.innerHTML='';
    wl.innerHTML='';

    watchlist.forEach(s => {

        let d = dataStore[s];
        if (!d) return;

        wl.innerHTML += `
        <div class="wl-item">
            <span onclick="switchChart('${s}')">${s.split(':')[1]}</span>
            <span onclick="removeTicker('${s}')" style="color:red">x</span>
        </div>`;

        tbody.innerHTML += `
        <tr>
            <td>${s.split(':')[1]}</td>
            <td>$${d.p}</td>
            <td>
                <div class="trend-meter">
                    <div class="trend-fill" style="width:${d.trend}%;background:${d.tCol}"></div>
                </div>
            </td>
            <td>${d.sr}</td>
            <td>${d.sqz}</td>
            <td>${d.sent}</td>
            <td>${d.div}</td>
            <td>${d.vol}</td>
            <td>${d.whale}</td>
            <td>${d.sig}</td>
            <td>${d.heads}</td>
            <td>${d.reason}</td>
        </tr>`;
    });
}

function switchChart(s) {
    currentS = s;

    new TradingView.widget({
        autosize:true,
        symbol:s,
        interval:"30",
        theme:"dark",
        container_id:"tv_chart_container"
    });
}

window.onload = () => {
    if (!watchlist.length) {
        watchlist = [...DEFAULTS];
        saveWL();
    }

    switchChart(currentS);
    startWS();
};
</script>

</body>
</html>
