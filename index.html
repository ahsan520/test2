<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alpha Terminal v42 | Fixed Layout</title>

<style>
:root {
    --bg:#0b0e11; --card:#161a1e; --border:#2b2f36;
    --bull:#00ffad; --bear:#ff3b30; --accent:#58a6ff; --gold:#f0b90b;
}

body {
    background:var(--bg); color:#eaecef;
    font-family:Inter,sans-serif; margin:0; padding:4px; font-size:10px;
}

.dashboard {
    display:grid;
    grid-template-columns:1fr;
    gap:8px;
}

/* 🔥 DESKTOP LAYOUT FIX */
@media (min-width:1024px){
    .dashboard{
        grid-template-columns:240px 1fr 300px;
        grid-template-rows:auto 500px;
        height:98vh;
    }

    .card-wl { grid-column:1; grid-row:1 / 3; }

    .card-table {
        grid-column:2 / 4;
        grid-row:1;
        max-height:400px;
        overflow-y:auto;
    }

    .card-chart {
        grid-column:2 / 4;
        grid-row:2;
    }
}

.card {
    background:var(--card);
    border:1px solid var(--border);
    border-radius:8px;
    padding:12px;
    display:flex;
    flex-direction:column;
}

.table-wrapper { overflow-x:auto; }

.monitor-table {
    width:100%;
    min-width:1200px;
    border-collapse:collapse;
}

.monitor-table th {
    color:#848e9c;
    font-size:9px;
    padding:8px 4px;
    border-bottom:1px solid var(--border);
}

.monitor-table td {
    padding:10px 4px;
    border-bottom:1px solid #1c2026;
    font-family:monospace;
}

.trend-meter { width:40px; height:4px; background:#333; border-radius:2px; }
.trend-fill { height:100%; }

.wl-item {
    display:flex;
    justify-content:space-between;
    padding:8px;
    border-bottom:1px solid #222;
}

input {
    background:#0b0e11;
    border:1px solid #444;
    color:white;
    padding:8px;
    width:100%;
}

.btn-add {
    background:var(--accent);
    color:white;
    border:none;
    padding:8px;
    margin-top:5px;
    cursor:pointer;
}

.reasoning { font-size:9px; color:#aaa; }

</style>
</head>

<body>

<div class="dashboard">

<!-- WATCHLIST -->
<div class="card card-wl">
    <h3>⭐ WATCHLIST</h3>
    <input id="newT" placeholder="Symbol (SOL)">
    <button class="btn-add" onclick="addTicker()">ADD</button>
    <button class="btn-add" onclick="resetJSON()">RESET JSON</button>
    <div id="wl-cont"></div>
</div>

<!-- 🔥 TABLE (NOW ON TOP) -->
<div class="card card-table">
<h3>📊 PREDATOR TABLE</h3>
<div class="table-wrapper">
<table class="monitor-table">
<thead>
<tr>
<th>TICKER</th><th>PRICE</th><th>TREND</th><th>SIGNAL</th><th>REASON</th>
</tr>
</thead>
<tbody id="monitor-body"></tbody>
</table>
</div>
</div>

<!-- 🔥 CHART BELOW -->
<div class="card card-chart" style="padding:0;">
<div id="tv_chart_container" style="height:100%;"></div>
</div>

<!-- FEED -->
<div class="card">
<h3>📡 FEED</h3>
<iframe src="https://cryptopanic.com/widgets/news/?bg_color=161A1E&text_color=EAECEF"
width="100%" height="100%"></iframe>
</div>

</div>

<script src="https://s3.tradingview.com/tv.js"></script>

<script>
let defaultWL = ["BINANCE:BTCUSDT","BINANCE:ETHUSDT","BINANCE:XRPUSDT"];

let watchlist = JSON.parse(localStorage.getItem('alphaWL')) || defaultWL;
let dataStore = {};
let currentS = watchlist[0];

async function sync(){

    localStorage.setItem('alphaWL', JSON.stringify(watchlist));

    for(let s of watchlist){

        const pair = s.split(':')[1];

        // 🔥 fallback first (so table NEVER empty)
        dataStore[s] = {
            p:"...",
            trend:0,
            tCol:"#444",
            sig:"WAIT",
            reason:"Loading..."
        };

        try{
            const res = await fetch(`https://api.allorigins.win/raw?url=https://api.binance.com/api/v3/ticker/24hr?symbol=${pair}`);
            const d = await res.json();

            const price = parseFloat(d.lastPrice);
            const change = parseFloat(d.priceChangePercent);

            dataStore[s] = {
                p:price.toFixed(2),
                trend:Math.abs(change)*10,
                tCol:change>0?'var(--bull)':'var(--bear)',
                sig:change>2?"BUY":(change<-2?"SELL":"WAIT"),
                reason:change>0?"Momentum":"Weak"
            };

        }catch(e){
            dataStore[s] = {
                p:"N/A",
                trend:0,
                tCol:"gray",
                sig:"WAIT",
                reason:"API Blocked"
            };
        }
    }

    render();
}

function render(){
    const body = document.getElementById('monitor-body');
    const wl = document.getElementById('wl-cont');

    body.innerHTML="";
    wl.innerHTML="";

    watchlist.forEach(s=>{
        const d = dataStore[s];

        wl.innerHTML += `
        <div class="wl-item">
            <span onclick="switchT('${s}')">${s.split(':')[1]}</span>
            <span onclick="delT('${s}')" style="color:red">x</span>
        </div>`;

        body.innerHTML += `
        <tr onclick="switchT('${s}')">
            <td>${s.split(':')[1]}</td>
            <td>${d.p}</td>
            <td>
                <div class="trend-meter">
                    <div class="trend-fill" style="width:${d.trend}%;background:${d.tCol}"></div>
                </div>
            </td>
            <td>${d.sig}</td>
            <td class="reasoning">${d.reason}</td>
        </tr>`;
    });
}

function switchT(s){
    currentS=s;
    new TradingView.widget({
        autosize:true,
        symbol:s,
        interval:"30",
        theme:"dark",
        container_id:"tv_chart_container"
    });
}

function addTicker(){
    const v=document.getElementById('newT').value.toUpperCase();
    if(v){
        watchlist.push(`BINANCE:${v}USDT`);
        sync();
    }
}

function delT(s){
    watchlist=watchlist.filter(x=>x!==s);
    sync();
}

function resetJSON(){
    localStorage.removeItem('alphaWL');
    watchlist = defaultWL;
    sync();
}

window.onload=()=>{
    switchT(currentS);
    sync();
    setInterval(sync,10000);
};
</script>

</body>
</html>
